name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Type check
        run: yarn type-check

      - name: Build
        run: yarn build

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "CI 검사를 통과하지 못했어요"
            attachments:
              - color: "#DC3545"
                blocks:
                  - type: "section"
                    text:
                      type: "mrkdwn"
                      text: "*:x: CI 검사를 통과하지 못했어요*"
                  - type: "section"
                    fields:
                      - type: "mrkdwn"
                        text: "*풀 리퀘스트*\n<${{ github.event.pull_request.html_url }}|${{ github.event.pull_request.title }}>"
                      - type: "mrkdwn"
                        text: "*브랜치*\n`${{ github.head_ref }}`"
                  - type: "section"
                    fields:
                      - type: "mrkdwn"
                        text: "*작성자*\n${{ github.actor }}"
                  - type: "actions"
                    elements:
                      - type: "button"
                        text:
                          type: "plain_text"
                          text: "실행 로그 확인하기"
                        url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
